name: CI/CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service:
          - backend
          - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        if: ${{ matrix.service == 'backend' }}
        run: docker build --build-arg GOPROXY=https://goproxy.cn,direct --build-arg GOSUMDB=off -t file-upload-backend -f backend/Dockerfile backend

      - name: Build frontend image
        if: ${{ matrix.service == 'frontend' }}
        run: docker build -t file-upload-frontend -f frontend/Dockerfile frontend

  deploy:
    runs-on: ubuntu-latest
    needs: build
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${{ secrets.SSH_PORT }}" "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy via Docker Compose
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          SSH_USER: ${{ secrets.SSH_USER }}
          FILE_UPLOAD_DEPLOY_PATH: ${{ secrets.FILE_UPLOAD_DEPLOY_PATH }}
          FILE_UPLOAD_ADMIN_PASSWORD: ${{ secrets.FILE_UPLOAD_ADMIN_PASSWORD }}
        run: |
          if [ -z "$FILE_UPLOAD_ADMIN_PASSWORD" ]; then
            echo "FILE_UPLOAD_ADMIN_PASSWORD secret is missing"
            exit 1
          fi
          ADMIN_PASSWORD_ESCAPED=$(printf '%q' "$FILE_UPLOAD_ADMIN_PASSWORD")
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" "cd '$FILE_UPLOAD_DEPLOY_PATH' && git pull --rebase && ADMIN_PASSWORD=$ADMIN_PASSWORD_ESCAPED docker compose up -d --build"
