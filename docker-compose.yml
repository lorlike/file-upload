services:
  postgres:
    image: postgres:16-alpine
    container_name: file-upload-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: file_upload
      POSTGRES_USER: file_upload
      POSTGRES_PASSWORD: file_upload
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    container_name: file-upload-backend
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      APP_PORT: 8080
      DATABASE_DSN: postgres://file_upload:file_upload@postgres:5432/file_upload?sslmode=disable
      JWT_SECRET: change-me-in-production
      TOKEN_TTL_HOURS: 48
      UPLOAD_DIR: /data/uploads
      MAX_UPLOAD_MB: 100
      CORS_ALLOWED_ORIGINS: http://localhost,http://127.0.0.1
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin123456
    volumes:
      - uploads:/data/uploads

  frontend:
    build:
      context: ./frontend
    container_name: file-upload-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"

volumes:
  pgdata:
  uploads:
